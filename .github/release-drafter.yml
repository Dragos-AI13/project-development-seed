name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Security"
    labels:
      - "security"
  - title: "Maintenance"
    labels:
      - "chore"
      - "dependencies"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
template: |
  ## What Changed
  $CHANGES

  ## Notes
  - Validate migrations and rollback plan before release.
  - Confirm monitoring/alerts are active post-deploy.
